[project]
name = "okf-cli"
version = "0.1.0"
description = "Open Knowledge Format tooling"
requires-python = ">=3.13"
dependencies = ["typer>=0.15"]

[project.scripts]
okf = "okf.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/okf"]

[dependency-groups]
dev = ["pytest>=8"]
