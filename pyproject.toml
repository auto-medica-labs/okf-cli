[project]
name = "okf-cli"
version = "0.2.1"
description = "Open Knowledge Format tooling"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.13"
dependencies = ["typer>=0.15", "pyyaml>=6"]

[project.scripts]
okf = "okf.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/okf"]

[dependency-groups]
dev = ["pytest>=8"]
